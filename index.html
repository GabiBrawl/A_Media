<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes">
    <title>A_Media</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/card.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar" aria-label="Sidebar">
            <div class="sidebar-shell">
                <header class="sidebar-head" aria-label="Brand panel">
                    <img src="assets/logo.png" alt="A_Media logo" class="sidebar-logo">
                    <h1 class="sidebar-title">A_Media</h1>
                    <p class="sidebar-subtitle">Curated tools and resources in one place.</p>
                </header>

                <nav class="sidebar-nav" aria-label="Primary navigation">
                    <a href="mailto:whitebelttakes@gmail.com" class="sidebar-nav-item">Email</a>
                    <a href="https://www.tiktok.com/@aiden_holmquist" class="sidebar-nav-item" target="_blank" rel="noopener noreferrer">TikTok</a>
                </nav>

                <section class="sidebar-workspace" aria-label="Product filters">
                    <div class="workspace-header">
                        <h2>Filter workspace</h2>
                        <p>Refine what appears in the catalog.</p>
                    </div>

                    <div class="filter-stack">
                        <div class="filter-group">
                            <label for="filter-search" class="filter-label">Search</label>
                            <input id="filter-search" class="filter-control" type="text" placeholder="Search products...">
                        </div>

                        <div class="filter-group">
                            <label for="filter-category" class="filter-label">Category</label>
                            <select id="filter-category" class="filter-control">
                                <option value="all">All Categories</option>
                            </select>
                        </div>

                        <div class="filter-group">
                            <label for="filter-price" class="filter-label">Price</label>
                            <select id="filter-price" class="filter-control">
                                <option value="all">All Prices</option>
                                <option value="0-50">$0 - $50</option>
                                <option value="50-100">$50 - $100</option>
                                <option value="100-200">$100 - $200</option>
                                <option value="200+">$200+</option>
                            </select>
                        </div>

                        <label class="filter-check" for="filter-picks">
                            <input id="filter-picks" type="checkbox">
                            Picks only
                        </label>

                        <button id="filter-reset" class="filter-reset-button" type="button">Reset Filters</button>
                    </div>
                </section>

                <section class="sidebar-source" aria-label="Data source info">
                    <p class="sidebar-source-label">Data sourced from</p>
                    <p class="sidebar-source-text"><a href="https://linktr.ee/A_Media" target="_blank" rel="noopener noreferrer">linktr.ee/A_Media</a></p>
                </section>

                <footer class="sidebar-foot" aria-label="Quote of the moment">
                    <p class="sidebar-foot-label">Quote of the moment</p>
                    <blockquote id="sidebar-quote" class="sidebar-quote-text"></blockquote>
                </footer>
            </div>
        </aside>
        <main>
            <section class="card-grid">
                <div id="product-grid"></div>
                <p id="empty-state" class="empty-state" hidden>No products match the selected filters.</p>
            </section>
        </main>
    </div>
    <script src="js/data.js"></script>
    <script src="js/last_updated.js"></script>
    <script src="js/card.js"></script>
    <script src="js/quotes.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
