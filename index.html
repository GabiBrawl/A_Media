<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A_Media</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/card.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <img src="assets/logo.png" alt="A_Media logo" class="sidebar-logo">
                <h1>A_Media</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>

            <section class="sidebar-filters" aria-label="Product filters">
                <h2>Filters</h2>

                <div class="filter-group">
                    <label for="filter-search">Search</label>
                    <input id="filter-search" type="text" placeholder="Search products...">
                </div>

                <div class="filter-group">
                    <label for="filter-category">Category</label>
                    <select id="filter-category">
                        <option value="all">All Categories</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filter-price">Price</label>
                    <select id="filter-price">
                        <option value="all">All Prices</option>
                        <option value="0-50">$0 - $50</option>
                        <option value="50-100">$50 - $100</option>
                        <option value="100-200">$100 - $200</option>
                        <option value="200+">$200+</option>
                    </select>
                </div>

                <label class="filter-check" for="filter-picks">
                    <input id="filter-picks" type="checkbox">
                    Picks only
                </label>

                <button id="filter-reset" type="button">Reset Filters</button>
            </section>
        </aside>
        <main>
            <section class="card-grid">
                <div id="product-grid"></div>
                <p id="empty-state" class="empty-state" hidden>No products match the selected filters.</p>
            </section>
        </main>
    </div>
    <script src="js/data.js"></script>
    <script src="js/last_updated.js"></script>
    <script src="js/card.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
